<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swimming Schedule 2026</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f9ff; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
    color: white; padding: 24px 20px; text-align: center;
    box-shadow: 0 4px 20px rgba(14,165,233,0.3);
  }
  header h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 700; letter-spacing: -0.5px; }
  header p { opacity: 0.85; margin-top: 6px; font-size: 0.9rem; }

  #name-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #name-modal.hidden { display: none; }
  .modal-box {
    background: white; border-radius: 20px; padding: 32px 28px;
    text-align: center; max-width: 340px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-box h2 { font-size: 1.3rem; margin-bottom: 8px; color: #1f2937; }
  .modal-box p { color: #6b7280; font-size: 0.9rem; margin-bottom: 24px; }
  .name-btn {
    display: block; width: 100%; padding: 14px;
    margin-bottom: 12px; border: 2px solid #e5e7eb;
    border-radius: 12px; background: white; font-size: 1rem;
    font-weight: 600; color: #374151; cursor: pointer; transition: all 0.15s;
  }
  .name-btn:hover { border-color: #0ea5e9; color: #0ea5e9; background: #f0f9ff; }
  .name-btn:last-child { margin-bottom: 0; }

  #badge-wrap { text-align: center; }
  #user-badge {
    background: white; margin: 16px auto 0; padding: 10px 16px;
    border-radius: 50px; display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.85rem; color: #374151; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer;
  }
  #user-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
  #user-badge .dot.offline { background: #ef4444; }

  .tab-bar {
    display: flex; max-width: 860px; margin: 16px auto 0; padding: 0 12px; gap: 8px;
  }
  .tab {
    flex: 1; padding: 12px 16px; background: white; border: 2px solid #e5e7eb;
    border-radius: 12px 12px 0 0; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; color: #6b7280;
    transition: all 0.15s; text-align: center; line-height: 1.2;
  }
  .tab:hover { border-color: #bae6fd; color: #0ea5e9; }
  .tab.active { color: #0284c7; border-color: #0ea5e9; border-bottom-color: #f0f9ff; background: #f0f9ff; }
  .tab-sub { display: block; font-size: 0.72rem; font-weight: 400; color: #9ca3af; margin-top: 3px; }
  .tab.active .tab-sub { color: #7dd3fc; }

  .session-panel { display: none; }
  .session-panel.active { display: block; }

  .table-wrap { overflow-x: auto; padding: 0 12px 40px; max-width: 860px; margin: 0 auto; }

  table {
    width: 100%; border-collapse: collapse; background: white;
    border-radius: 0 0 16px 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }

  thead tr.group-row th {
    padding: 12px 10px 8px; font-size: 0.78rem; font-weight: 700;
    text-align: center; text-transform: uppercase; letter-spacing: 0.7px;
  }
  .th-time { background: #f1f5f9; color: #64748b; }
  .th-young { background: #f5f3ff; color: #6d28d9; border-left: 2px solid #e9d5ff; }
  .th-older { background: #fff7ed; color: #c2410c; border-left: 2px solid #fed7aa; }

  thead tr.name-row th {
    padding: 10px 8px; font-size: 0.82rem; font-weight: 600;
    text-align: center; white-space: nowrap;
  }
  .th-time-name { background: #0ea5e9; color: white; text-align: left; padding-left: 16px; min-width: 90px; }
  .th-young-name { background: #7c3aed; color: white; }
  .th-older-name { background: #ea580c; color: white; }
  .th-older-first { border-left: 2px solid rgba(255,255,255,0.3); }

  /* Date group header rows */
  .date-group-row td {
    padding: 8px 16px; font-weight: 700; font-size: 0.82rem;
    background: #e0f2fe; color: #0369a1;
    border-top: 2px solid #bae6fd; letter-spacing: 0.3px;
  }

  /* Time slot rows */
  tbody tr.slot-row td {
    padding: 8px 8px; border-bottom: 1px solid #f0f9ff; vertical-align: middle;
  }
  tbody tr.slot-row td:first-child {
    padding-left: 16px; font-size: 0.82rem; color: #64748b;
    font-weight: 500; white-space: nowrap;
  }
  tbody tr.slot-row:last-of-type td { border-bottom: 2px solid #e0f2fe; }

  td.older-start { border-left: 2px solid #e5e7eb; }

  .check-cell { text-align: center; }
  .check-cell input[type=checkbox] { display: none; }
  .check-cell label {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    border: 2px solid #d1d5db; background: white; cursor: pointer; transition: all 0.15s;
  }
  .check-cell input:checked + label { background: #dcfce7; border-color: #16a34a; }
  .check-cell input:checked + label::after { content: '✓'; color: #16a34a; font-weight: 900; font-size: 1.1rem; }
  .check-cell label:not(.mine) { cursor: default; pointer-events: none; }
  .check-cell label.other-checked { background: #dcfce7; border-color: #16a34a; }
  .check-cell label.other-checked::after { content: '✓'; color: #16a34a; font-weight: 900; font-size: 1.1rem; }
</style>
</head>
<body>

<div id="name-modal">
  <div class="modal-box">
    <h2>🏊 Who are you?</h2>
    <p>Pick your name to check off your Thursday lessons</p>
    <button class="name-btn" onclick="setUser('Chloe')">Chloe</button>
    <button class="name-btn" onclick="setUser('Noelle')">Noelle</button>
    <button class="name-btn" onclick="setUser('Simon')">Simon</button>
    <button class="name-btn" onclick="setUser('Charlie')">Charlie</button>
    <button class="name-btn" onclick="setUser('Luke')">Luke</button>
    <button class="name-btn" onclick="setUser('Remy')">Remy</button>
    <button class="name-btn" onclick="setUser('Max')">Max</button>
    <button class="name-btn" onclick="setUser('Leo')">Leo</button>
  </div>
</div>

<header>
  <h1>🏊 Swimming Schedule 2026</h1>
  <p>Check the Thursdays you'll be attending your lesson</p>
</header>

<div id="badge-wrap">
  <div id="user-badge" onclick="changeUser()">
    <span class="dot" id="conn-dot"></span>
    <span id="badge-name">...</span>
    <span style="color:#9ca3af;font-size:0.8rem">· tap to change</span>
  </div>
</div>

<div class="tab-bar">
  <button id="tab-1" class="tab active" onclick="switchTab(1)">
    Session 1 <span class="tab-sub">June 4 – July 9</span>
  </button>
  <button id="tab-2" class="tab" onclick="switchTab(2)">
    Session 2 <span class="tab-sub">July 16 – Aug 20</span>
  </button>
</div>

<!-- Session 1: Chloe, Noelle | Luke, Remy, Max -->
<div id="panel-1" class="session-panel active">
  <div class="table-wrap">
    <table>
      <thead>
        <tr class="group-row">
          <th class="th-time" rowspan="2">Time</th>
          <th class="th-young" colspan="2">Young 1:1</th>
          <th class="th-older" colspan="3">Older Group</th>
        </tr>
        <tr class="name-row">
          <th class="th-young-name">Chloe</th>
          <th class="th-young-name">Noelle</th>
          <th class="th-older-name th-older-first">Luke</th>
          <th class="th-older-name">Remy</th>
          <th class="th-older-name">Max</th>
        </tr>
      </thead>
      <tbody id="body-1"></tbody>
    </table>
  </div>
</div>

<!-- Session 2: Chloe, Noelle, Simon, Charlie | Luke, Remy, Max, Leo -->
<div id="panel-2" class="session-panel">
  <div class="table-wrap">
    <table>
      <thead>
        <tr class="group-row">
          <th class="th-time" rowspan="2">Time</th>
          <th class="th-young" colspan="4">Young 1:1</th>
          <th class="th-older" colspan="4">Older Group</th>
        </tr>
        <tr class="name-row">
          <th class="th-young-name">Chloe</th>
          <th class="th-young-name">Noelle</th>
          <th class="th-young-name">Simon</th>
          <th class="th-young-name">Charlie</th>
          <th class="th-older-name th-older-first">Luke</th>
          <th class="th-older-name">Remy</th>
          <th class="th-older-name">Max</th>
          <th class="th-older-name">Leo</th>
        </tr>
      </thead>
      <tbody id="body-2"></tbody>
    </table>
  </div>
</div>

<script>
const firebaseConfig = {
  databaseURL: "https://lala-schedule-13f59-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref('swimming');

const SESSION_CONFIG = [
  {
    id: 1,
    start: [2026, 5, 4],
    end:   [2026, 6, 9],
    young: ['Chloe', 'Noelle'],
    older: ['Luke', 'Remy', 'Max']
  },
  {
    id: 2,
    start: [2026, 6, 16],
    end:   [2026, 7, 20],
    young: ['Chloe', 'Noelle', 'Simon', 'Charlie'],
    older: ['Luke', 'Remy', 'Max', 'Leo']
  }
];

let currentUser = localStorage.getItem('swim-user') || null;
let dbData = {};

function getThursdays(start, end) {
  const dates = [];
  const d = new Date(...start);
  const last = new Date(...end);
  while (d <= last) {
    if (d.getDay() === 4) dates.push({ date: new Date(d), key: d.toISOString().slice(0,10) });
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function addMins(t, mins) {
  const total = Math.floor(t / 100) * 60 + (t % 100) + mins;
  return Math.floor(total / 60) * 100 + (total % 60);
}

function getSlots(dateKey, sessionId) {
  const start = sessionId === 1 && dateKey === '2026-06-04' ? 1530 : 1500;
  const count = sessionId === 1 ? 3 : 4;
  return Array.from({ length: count }, (_, i) => {
    const t = addMins(start, i * 30);
    return { label: fmtTime(t), key: `${dateKey}-${t}` };
  });
}

function fmtTime(t) {
  const h = Math.floor(t / 100);
  const m = t % 100;
  return `${h > 12 ? h - 12 : h}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) { return `Thu, ${MONTHS[d.getMonth()]} ${d.getDate()}`; }

function buildSession({ id, start, end, young, older }) {
  const names = [...young, ...older];
  const totalCols = 1 + names.length;
  const tbody = document.getElementById(`body-${id}`);
  tbody.innerHTML = '';

  getThursdays(start, end).forEach(({ date, key: dateKey }) => {
    const groupRow = document.createElement('tr');
    groupRow.className = 'date-group-row';
    groupRow.innerHTML = `<td colspan="${totalCols}">${fmtDate(date)}</td>`;
    tbody.appendChild(groupRow);

    getSlots(dateKey, id).forEach(({ label, key: slotKey }) => {
      const tr = document.createElement('tr');
      tr.className = 'slot-row';
      tr.id = `s${id}-${slotKey}`;

      let html = `<td>${label}</td>`;
      names.forEach(name => {
        const cbId = `s${id}-cb-${slotKey}-${name}`;
        const isMine = name === currentUser;
        const divClass = name === older[0] ? ' older-start' : '';
        html += `<td class="check-cell${divClass}">
          <input type="checkbox" id="${cbId}" ${isMine ? '' : 'disabled'}>
          <label for="${cbId}" class="${isMine ? 'mine' : ''}"></label>
        </td>`;
      });
      tr.innerHTML = html;
      tbody.appendChild(tr);

      names.forEach(name => {
        if (name !== currentUser) return;
        const cb = document.getElementById(`s${id}-cb-${slotKey}-${name}`);
        if (cb) cb.addEventListener('change', () => ref.child(slotKey).child(name).set(cb.checked));
      });
    });
  });
}

function buildAllTables() {
  SESSION_CONFIG.forEach(buildSession);
  applyDbData();
}

function applyDbData() {
  SESSION_CONFIG.forEach(({ id, start, end, young, older }) => {
    const names = [...young, ...older];
    getThursdays(start, end).forEach(({ key: dateKey }) => {
      getSlots(dateKey, id).forEach(({ key: slotKey }) => {
        const slotData = dbData[slotKey] || {};
        names.forEach(name => {
          const cb = document.getElementById(`s${id}-cb-${slotKey}-${name}`);
          const lbl = cb?.nextElementSibling;
          if (!cb) return;
          cb.checked = !!slotData[name];
          if (lbl && name !== currentUser) lbl.classList.toggle('other-checked', !!slotData[name]);
        });
      });
    });
  });
}

function switchTab(n) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.session-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${n}`).classList.add('active');
  document.getElementById(`panel-${n}`).classList.add('active');
}

function setUser(name) {
  currentUser = name;
  localStorage.setItem('swim-user', name);
  document.getElementById('name-modal').classList.add('hidden');
  document.getElementById('badge-name').textContent = name;
  buildAllTables();
}

function changeUser() {
  localStorage.removeItem('swim-user');
  currentUser = null;
  document.getElementById('name-modal').classList.remove('hidden');
}

firebase.database().ref('.info/connected').on('value', snap => {
  document.getElementById('conn-dot').classList.toggle('offline', !snap.val());
});

ref.on('value', snap => {
  dbData = snap.val() || {};
  applyDbData();
});

if (currentUser) {
  document.getElementById('name-modal').classList.add('hidden');
  document.getElementById('badge-name').textContent = currentUser;
}
buildAllTables();
</script>
</body>
</html>
